version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - gosec
    - revive
    - gocyclo
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
    staticcheck:
      checks: ["all", "-SA9008"]
